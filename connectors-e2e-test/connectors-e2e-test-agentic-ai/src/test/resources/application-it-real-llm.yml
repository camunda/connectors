spring:
  main:
    allow-bean-definition-overriding: true
camunda:
  process-test:
    connectors-enabled: true
    connectors-docker-image-name: ${CONNECTORS_IMAGE_NAME:registry.camunda.cloud/team-connectors/connectors-bundle}
    # In CI, CONNECTORS_IMAGE_VERSION is set from the build-image job output.
    # To test locally, build the image first (mvn package -pl bundle/default-bundle -DskipTests),
    # then export CONNECTORS_IMAGE_NAME and CONNECTORS_IMAGE_VERSION before running.
    connectors-docker-image-version: ${CONNECTORS_IMAGE_VERSION:SNAPSHOT}
    # Disable the HTTP connector in the Docker bundle so test mocks intercept tool calls instead
    connectors-env-vars:
      CONNECTOR_OUTBOUND_DISABLED: "io.camunda:http-json:1"
    connectors-secrets:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    judge:
      chat-model:
        provider: openai
        api-key: ${OPENAI_API_KEY}
        model: gpt-5-nano
      threshold: 0.7
