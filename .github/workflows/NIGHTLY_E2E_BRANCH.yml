name: E2E branch run

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml
      - name: Create settings.xml
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      # Non-PR (nightly/manual): build + unit-test + format-check all connector modules
      # without the connectors-e2e-test subtree
      - name: Build connectors with tests (non-PR)
        if: github.event_name != 'pull_request'
        run: |
          E2E_EXCLUDES=$(find connectors-e2e-test -name pom.xml -not -path '*/target/*' -printf '!%h\n' | paste -sd, -)
          ./mvnw --batch-mode -U clean install -PcheckFormat -pl "$E2E_EXCLUDES"

      # PR: build all connector modules without running tests (e2e is the only thing tested).
      - name: Build connectors without tests (PR)
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode -U clean install -DskipTests

      # Build the full e2e-test subtree (skip running tests) so that the parent POM and all
      # first-party e2e artifacts are installed to ~/.m2 and included in the uploaded artifact.
      - name: Build e2e-test modules
        run: ./mvnw --batch-mode install -DskipTests -f connectors-e2e-test/pom.xml

      # Discover the e2e-test modules to run from this branch's checkout so the test matrix is
      # branch-accurate. Leaf poms with `jar` packaging are test modules; aggregators (`pom`
      # packaging) and `*-base` shared libraries are excluded. Paths are emitted relative to
      # connectors-e2e-test/pom.xml so they can be passed directly to `-pl`.
      - name: Discover e2e-test modules
        id: set-modules
        run: |
          modules=$(find connectors-e2e-test -name pom.xml -not -path '*/target/*' | while read -r p; do
            d=$(dirname "$p"); base=$(basename "$d")
            pkg=$(grep -m1 -oP '(?<=<packaging>)[^<]+' "$p" || echo jar)
            [ "$pkg" = "pom" ] && continue
            case "$base" in *-base) continue;; esac
            echo "${d#connectors-e2e-test/}"
          done | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "modules=$modules" >> $GITHUB_OUTPUT

      - name: Sanitize branch name for artifact
        id: sanitize
        run: echo "branch=${BRANCH//\//-}" >> $GITHUB_OUTPUT
        env:
          BRANCH: ${{ inputs.branch }}

      # Hand the built artifacts (connectors + e2e subtree) to the test matrix.
      - name: Upload first-party artifacts
        uses: actions/upload-artifact@v7
        with:
          name: m2-firstparty-${{ steps.sanitize.outputs.branch }}-${{ github.run_id }}
          path: ~/.m2/repository/io/camunda/connector
          retention-days: 1
          include-hidden-files: true
          overwrite: true

  # Test phase (matrix: module): each e2e-test module runs in its own job, in isolation.
  # Defaults to ubuntu-latest; resource-heavy modules override the runner via matrix.include.
  test:
    name: ${{ matrix.module }}
    needs: build
    runs-on: ${{ matrix.runner || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.build.outputs.modules) }}
        include:
          # Override the runner for resource-heavy modules; all others use ubuntu-latest.
          - module: connectors-e2e-test-agentic-ai
            runner: gcp-core-8-default
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      - name: Create settings.xml
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install element templates CLI
        run: npm install --global element-templates-cli@$(jq -r '.devDependencies["element-templates-cli"]' .github/workflows/package.json)

      - name: Sanitize names for artifact
        id: sanitize
        run: |
          echo "branch=${BRANCH//\//-}" >> $GITHUB_OUTPUT
          echo "module=${MODULE//\//-}" >> $GITHUB_OUTPUT
        env:
          BRANCH: ${{ inputs.branch }}
          MODULE: ${{ matrix.module }}

      # Restore the first-party SNAPSHOTs built by the build job; the test run resolves
      # connectors + e2e base from here and does not rebuild them.
      - name: Download first-party artifacts
        uses: actions/download-artifact@v8
        with:
          name: m2-firstparty-${{ steps.sanitize.outputs.branch }}-${{ github.run_id }}
          path: ~/.m2/repository/io/camunda/connector

      # Run only this module's tests. No -am: base/connector SNAPSHOTs come from the downloaded
      # artifact, so nothing upstream is rebuilt.
      - name: Test e2e module
        run: ./mvnw --batch-mode test -pl "${{ matrix.module }}" -f connectors-e2e-test/pom.xml

      - name: Publish Test Report
        if: always()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Tests (${{ inputs.branch }} / ${{ matrix.module }})

      - name: Upload detailed surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ steps.sanitize.outputs.branch }}-${{ steps.sanitize.outputs.module }}-${{ github.run_id }}-${{ github.run_attempt }}
          # *-output.txt holds the redirected test stdout (parent pom sets redirectTestOutputToFile=true);
          # the XML <system-out> is empty, so upload the txt files to retain test logs from CI runs.
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*-output.txt

  # Post a single Slack message per branch listing all failed test modules.
  # Only fires for main and stable branches (not PR runs).
  notify:
    name: Notify
    needs: test
    if: always() && needs.test.result == 'failure' && (inputs.branch == 'main' || startsWith(inputs.branch, 'stable/'))
    runs-on: ubuntu-latest
    steps:
      # Reusable workflow sub-jobs appear as "{calling_job} / {sub_job}" in the API.
      # The calling job for this branch is "($BRANCH)", so filter by that prefix.
      - name: Fetch failed modules
        id: modules
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.branch }}
        run: |
          prefix="(${BRANCH}) / "
          list=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs" \
            --paginate \
            --jq --arg p "$prefix" \
            '[.jobs[] | select(.conclusion == "failure") | select(.name | startswith($p)) | .name | ltrimstr($p) | select(test("^connectors-"))] | map("• " + .) | join("\\n")' \
          )
          [ -z "$list" ] && list="(see run for details)"
          echo "list=$list" >> $GITHUB_OUTPUT

      - name: Post failure summary to Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          token: ${{ secrets.CONNECTORS_SLACK_BOT_TOKEN }}
          method: chat.postMessage
          payload: |
            {
              "channel": ${{ secrets.CONNECTORS_SUPPORT_SLACK_CHANNEL_ID }},
              "text": ":alarm: ${{ secrets.CONNECTORS_MEDIC_SLACK_GROUP_ID }} E2E tests failed on `${{ inputs.branch }}`\n${{ steps.modules.outputs.list }}\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
