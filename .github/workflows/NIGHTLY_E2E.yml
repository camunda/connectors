name: E2E test run

on:
  workflow_dispatch:
  schedule: # Run nightly
    - cron: "0 3 * * *"  # Runs daily at 03:00 UTC
  pull_request:
    types: [ labeled, synchronize ]

jobs:

  get-branches:
    runs-on: ubuntu-latest
    # Only run if scheduled/manual OR if the 'e2e-tests' label exists on a non-fork PR
    if: |
      github.event_name != 'pull_request' || 
      (github.event.pull_request.head.repo.fork == false && 
       (github.event.action == 'labeled' && github.event.label.name == 'e2e-tests') ||
       (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'e2e-tests')))
    outputs:
      branches: ${{ steps.set-matrix.outputs.branches }}
    steps:
      - name: Fetch stable branches
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PR, only test the PR's head ref
            echo "branches=[\"${{ github.head_ref }}\"]" >> $GITHUB_OUTPUT
          else
            # For scheduled/manual runs, test main and all stable branches
            git ls-remote --heads https://github.com/${{ github.repository }}.git | \
            awk '{print $2}' | sed 's|refs/heads/||' | grep '^stable/' > stables.txt || true
            all_branches=$( (echo "main"; cat stables.txt) | grep -v '^$' | jq -R -s -c 'split("\n")[:-1]' )
            echo "branches=$all_branches" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run-e2e-tests:
    name: (${{ matrix.branch }}) Nightly E2E test run
    needs: get-branches
    runs-on: gcp-core-4-default
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.get-branches.outputs.branches) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml

      - name: 'Create settings.xml'
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install element templates CLI
        run: npm install --global element-templates-cli@$(jq -r '.devDependencies["element-templates-cli"]' .github/workflows/package.json)

      # TEMPORARY (experiment, do NOT merge): on PRs, build the whole reactor without running
      # tests (-DskipTests, install so the e2e modules resolve sibling artifacts from ~/.m2),
      # then run tests only for the connectors-e2e-test modules to iterate fast on the flaky tests.
      # `-f connectors-e2e-test/pom.xml` makes that aggregator the reactor root so ALL its
      # submodules are tested. NOTE: `-pl connectors-e2e-test` would NOT work — it selects only the
      # aggregator pom (no tests) and does not recurse into children. To narrow to just the flaky
      # A2A tests, use `-pl connectors-e2e-test/connectors-e2e-test-agentic-ai` instead.
      # Revert to the single full-build step below before merge.
      - name: Build all modules without tests (PR experiment)
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode -U clean install -DskipTests -PcheckFormat

      - name: Test connectors-e2e-test (PR experiment)
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode test -f connectors-e2e-test/pom.xml

      - name: Build Connectors
        if: github.event_name != 'pull_request'
        run: ./mvnw --batch-mode -U clean test -PcheckFormat

      - name: Publish Test Report
        if: always()
        uses: scacap/action-surefire-report@v1

      - name: Sanitize branch name for artifact
        if: always()
        id: sanitize
        run: |
          SANITIZED="${BRANCH//\//-}"
          echo "branch=$SANITIZED" >> $GITHUB_OUTPUT
        env:
          BRANCH: ${{ matrix.branch }}

      - name: Upload detailed surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ steps.sanitize.outputs.branch }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: '**/target/surefire-reports/*.xml'

      - name: Send Slack notification on failure
        if: failure() && (matrix.branch == 'main' || startsWith(matrix.branch, 'stable/'))
        uses: slackapi/slack-github-action@v3.0.3
        with:
          token: ${{ secrets.CONNECTORS_SLACK_BOT_TOKEN }}
          method: chat.postMessage
          payload: |
            {
              "channel": ${{ secrets.CONNECTORS_SUPPORT_SLACK_CHANNEL_ID }},
              "text": ":alarm: ${{ secrets.CONNECTORS_MEDIC_SLACK_GROUP_ID }} E2E test run failed on branch `${{ matrix.branch}}`.\nCheck details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }