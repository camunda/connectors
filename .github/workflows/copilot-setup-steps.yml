# description: Instructions for GitHub co-pilot coding agent, ensuring the agent has an environment that it can work in.
# see_also: https://docs.github.com/en/enterprise-cloud@latest/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
# test location: /
# type: AGENT_SETUP
# owner: @camunda/monorepo-devops-team
---
name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      # If we want to align Copilot and CI setups more in the future, consider reusing the tool setup patterns from DEPLOY_SNAPSHOTS.yaml and RELEASE.yaml (asdf-vm/actions/install@v4 with .tool-versions, which currently specifies Java 25)
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'
