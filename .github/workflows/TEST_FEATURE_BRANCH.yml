name: Test branch

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - '**'
      - '!main'
      - '!gh-readonly-queue/**'
  merge_group:
    branches: [ main ]

# Cancel stale runs of the same type (push-on-push, PR-on-PR) without
# letting push and pull_request events cancel each other. Merge-queue runs
# are keyed on the merge group's head ref so entries queued behind others
# don't collide into the same group and get cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Determine internal build:
      # Internal if repository owner is camunda AND (not a PR from a fork).
      # For pull_request: !github.event.pull_request.head.repo.fork
      # For push/merge_group: repository is always base repo if owner matches.
      # We avoid using secrets for fork pushes because this workflow file exists only in base repo; fork pushes wouldn't have camunda owner.
      - name: Set internal build flag
        id: internal
        run: |
          if [ "${{ github.repository_owner }}" = "camunda" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              if [ "${{ github.event.pull_request.head.repo.fork }}" = "false" ]; then
                echo "internal=true" >> $GITHUB_OUTPUT
              else
                echo "internal=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "internal=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "internal=false" >> $GITHUB_OUTPUT
          fi

      # Restore cache (distinct key for internal vs external to avoid mixing artifacts)
      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}-${{ steps.internal.outputs.internal == 'true' && 'internal' || 'external' }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: '24'

      - name: Install element templates CLI
        run: npm install --global element-templates-cli@$(jq -r '.devDependencies["element-templates-cli"]' .github/workflows/package.json)

      # Internal-only: fetch Nexus credentials from Vault and create settings.xml with mirror
      - name: Import Nexus Secrets (internal only)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_USR;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_PASSPHRASE;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_SEC;

      - name: Create internal Maven settings.xml (Nexus mirror)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             },
            {
               "id": "central",
               "username": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_USR }}",
               "password": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_PSW }}"
             }
            ]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      # Build and test (format and javadoc run in parallel jobs)
      # The build above regenerates all element template JSON files as part of
      # the `process-classes` phase (element-template-generator-maven-plugin),
      # writing them back into each connector's element-templates/ source dir.
      - name: Build Connectors
        run: ./mvnw --batch-mode -U clean test -Dquickly -T 1C

      # Fail if the regenerated templates differ from what's committed. This is a
      # diff check only — CI never commits or modifies files. Versioned snapshots
      # (element-templates/versioned/) are intentionally excluded, as they are
      # pinned and not overwritten on regeneration.
      - name: Verify element templates are in sync with Java source
        run: |
          set -euo pipefail
          # Directory-anchored pathspecs: root templates and hybrid/ variants,
          # excluding pinned versioned/ snapshots.
          PATHSPEC=(
            '*/element-templates/*.json'
            '*/element-templates/hybrid/*.json'
            ':(exclude)*/element-templates/versioned/*'
          )
          # Register intent-to-add for any brand-new (untracked) generated
          # templates so a single `git diff` reports — with content — both
          # modified and newly created files. This stages no file content.
          git add -N -- "${PATHSPEC[@]}"
          if git diff --quiet -- "${PATHSPEC[@]}"; then
            echo "✅ All element templates match their Java source."
          else
            echo "❌ Element templates are out of sync with their Java source."
            echo "   Run 'mvn install' (or 'mvn process-classes') locally and commit the regenerated templates."
            echo ""
            git diff --stat -- "${PATHSPEC[@]}"
            echo ""
            git diff -- "${PATHSPEC[@]}"
            exit 1
          fi

      - name: Publish Test Report
        if: always() && steps.internal.outputs.internal == 'true'
        uses: scacap/action-surefire-report@v1
        with:
          check_name: 'Publish Test Report'

      - name: Upload detailed surefire reports
        if: always() && steps.internal.outputs.internal == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'

      - name: Lint Dockerfile - connector-runtime
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: connector-runtime/connector-runtime-application/Dockerfile

      - name: Lint Dockerfile - SaaS
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: bundle/camunda-saas-bundle/Dockerfile

      - name: Lint Dockerfile - default-bundle
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: bundle/default-bundle/Dockerfile

      - name: Check element templates for forbidden links to /next/ documentation
        run: |
          chmod +x ./.github/workflows/scripts/collect_all_element_template_docs_links.sh
          ./.github/workflows/scripts/collect_all_element_template_docs_links.sh --current-only
          if grep -q "/next/" connectors-element-template-links.txt; then
            echo "❌ Forbidden link to '/next/' documentation found!"
            exit 1
          fi
        shell: bash

      - name: Validate element templates
        run: |
          ./mvnw --batch-mode -pl element-template-generator/validator -am package -DskipTests
          ./element-template-generator/validator/target/appassembler/bin/element-template-validator

  check-javadoc:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set internal build flag
        id: internal
        run: |
          if [ "${{ github.repository_owner }}" = "camunda" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              if [ "${{ github.event.pull_request.head.repo.fork }}" = "false" ]; then
                echo "internal=true" >> $GITHUB_OUTPUT
              else
                echo "internal=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "internal=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "internal=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}-${{ steps.internal.outputs.internal == 'true' && 'internal' || 'external' }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      - name: Import Nexus Secrets (internal only)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_USR;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_PASSPHRASE;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_SEC;

      - name: Create internal Maven settings.xml (Nexus mirror)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             },
            {
               "id": "central",
               "username": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_USR }}",
               "password": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_PSW }}"
             }
            ]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      - name: Install element-template-generator plugin
        run: ./mvnw --batch-mode install -pl element-template-generator/maven-plugin -am -DskipTests -Dquickly

      - name: Check Javadoc
        run: ./mvnw --batch-mode compile javadoc:javadoc -Dquickly

  check-format:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set internal build flag
        id: internal
        run: |
          if [ "${{ github.repository_owner }}" = "camunda" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              if [ "${{ github.event.pull_request.head.repo.fork }}" = "false" ]; then
                echo "internal=true" >> $GITHUB_OUTPUT
              else
                echo "internal=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "internal=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "internal=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}-${{ steps.internal.outputs.internal == 'true' && 'internal' || 'external' }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      - name: Import Nexus Secrets (internal only)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_USR;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_DEPLOYMENT_PSW;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_PASSPHRASE;
            secret/data/github.com/organizations/camunda MAVEN_CENTRAL_GPG_SIGNING_KEY_SEC;

      - name: Create internal Maven settings.xml (Nexus mirror)
        if: ${{ steps.internal.outputs.internal == 'true' }}
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             },
            {
               "id": "central",
               "username": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_USR }}",
               "password": "${{ steps.secrets.outputs.MAVEN_CENTRAL_DEPLOYMENT_PSW }}"
             }
            ]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!confluent,!shibboleth", "name": "camunda Nexus"}]'

      - name: Install element-template-generator plugin
        run: ./mvnw --batch-mode install -pl element-template-generator/maven-plugin -am -DskipTests -Dquickly

      - name: Check Format
        run: ./mvnw --batch-mode validate -PcheckFormat -Dquickly

  check-versioned-element-templates:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # Full history so the merge-base with origin/main can be resolved for
          # the three-dot diff used to find newly added versioned templates.
          fetch-depth: 0

      - name: Fetch main ref
        run: git fetch origin main --quiet
        shell: bash

      - name: Check versioned element templates match main
        run: |
          chmod +x ./.github/workflows/scripts/check_versioned_element_templates.sh
          ./.github/workflows/scripts/check_versioned_element_templates.sh
        shell: bash
