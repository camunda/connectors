---
name: QA Required
on:
  pull_request:
    types: [ labeled ]

# Only cancel if the same PR gets qa:required label added again
concurrency:
  group: qa-required-${{ github.event.pull_request.number }}-${{ github.event.label.name }}
  cancel-in-progress: true

jobs:
  process-qa-label:
    name: Process QA Required Label
    runs-on: ubuntu-latest
    # Only run if the 'qa:required' label was just added
    if: |
      github.event.pull_request.state != 'closed' && 
      github.event.label.name == 'qa:required'

    steps:
      - name: Import Secrets
        id: vault-secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID}}
          secrets: |
            secret/data/products/connectors/ci/common GITHUB_APP_ID;
            secret/data/products/connectors/ci/common GITHUB_APP_PRIVATE_KEY;

      - name: Generate a GitHub token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.vault-secrets.outputs.GITHUB_APP_ID }}
          private-key: ${{ steps.vault-secrets.outputs.GITHUB_APP_PRIVATE_KEY }}

      - name: Add deploy-preview label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Adding deploy-preview label to PR #$PR_NUMBER"
          gh pr edit "$PR_NUMBER" --repo ${{ github.repository }} --add-label "deploy-preview"

      - name: Get Project ID and Status Field ID
        id: get-project-info
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Extract repo name from full repository path
          REPO_NAME="${{ github.event.repository.name }}"
          
          # Query the PR directly to get its project items
          PR_INFO=$(gh api graphql -f query='
            query($organization: String!, $repoName: String!, $prNumber: Int!) {
              repository(owner: $organization, name: $repoName) {
                pullRequest(number: $prNumber) {
                  id
                  title
                  number
                  projectItems(first: 1) {
                    nodes {
                      id
                      project {
                        id
                        title
                        field(name: "Status") {
                          ... on ProjectV2SingleSelectField {
                            id
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }' -f organization='${{ github.repository_owner }}' -f repoName="$REPO_NAME" -F prNumber=${{ github.event.pull_request.number }})
          
          echo "$PR_INFO" > project_info.json
          echo "Raw PR info:"
          echo "$PR_INFO" | jq .
          
          # List all status options to find the correct one
          echo "Available status options:"
          echo "$PR_INFO" | jq -r '.data.repository.pullRequest.projectItems.nodes[0].project.field.options[] | "\(.id): \(.name)"'
          
          # Extract the project item info from the PR
          ITEM_ID=$(echo "$PR_INFO" | jq -r '.data.repository.pullRequest.projectItems.nodes[0].id // empty')
          PROJECT_ID=$(echo "$PR_INFO" | jq -r '.data.repository.pullRequest.projectItems.nodes[0].project.id // empty')
          FIELD_ID=$(echo "$PR_INFO" | jq -r '.data.repository.pullRequest.projectItems.nodes[0].project.field.id // empty')
          # Use the known status ID for "In QA" (with emojis)
          STATUS_OPTION_ID="96fa6798"
          
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "field_id=$FIELD_ID" >> $GITHUB_OUTPUT
          echo "status_option_id=$STATUS_OPTION_ID" >> $GITHUB_OUTPUT
          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT
          
          echo "Project ID: $PROJECT_ID"
          echo "Field ID: $FIELD_ID"
          echo "Status Option ID: $STATUS_OPTION_ID"
          echo "Item ID: $ITEM_ID"

      - name: Update PR status to "In QA"
        continue-on-error: true
        if: steps.get-project-info.outputs.project_id != '' && steps.get-project-info.outputs.item_id != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ steps.get-project-info.outputs.project_id }}
          ITEM_ID: ${{ steps.get-project-info.outputs.item_id }}
          FIELD_ID: ${{ steps.get-project-info.outputs.field_id }}
          STATUS_OPTION_ID: ${{ steps.get-project-info.outputs.status_option_id }}
        run: |
          if [ -z "$STATUS_OPTION_ID" ]; then
            echo "Warning: Could not find 'In QA' status option in the project"
            exit 0
          fi
          
          echo "Updating PR status to 'In QA'"
          echo "Project ID: $PROJECT_ID"
          echo "Item ID: $ITEM_ID"
          echo "Field ID: $FIELD_ID"
          echo "Status Option ID: $STATUS_OPTION_ID"
          
          gh api graphql -f query='
            mutation($projectItemId: ID!, $statusValue: String!) {
              updateProjectV2ItemFieldValue(input: {
                itemId: $projectItemId,
                fieldId: "'"$FIELD_ID"'",
                value: {
                  singleSelectOptionId: $statusValue
                },
                projectId: "'"$PROJECT_ID"'"
              }) {
                projectV2Item {
                  id
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue {
                      name
                    }
                  }
                }
              }
            }' -f projectItemId="$ITEM_ID" -f statusValue="$STATUS_OPTION_ID"

      - name: Add Szik as assignee
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Adding Szik as assignee to PR #$PR_NUMBER"
          # Get current assignees
          CURRENT_ASSIGNEES=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json assignees --jq '.assignees[].login' | tr '\n' ',' | sed 's/,$//')
          
          # Add Szik if not already assigned
          if echo "$CURRENT_ASSIGNEES" | grep -q "Szik"; then
            echo "Szik is already assigned"
          else
            gh pr edit "$PR_NUMBER" --repo ${{ github.repository }} --add-assignee "Szik"
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3.0.3
        with:
          token: ${{ secrets.CONNECTORS_SLACK_BOT_TOKEN }}
          method: chat.postMessage
          payload: |
            {
              "channel": "${{ secrets.CONNECTORS_QA_SLACK_CHANNEL_ID }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Hi ${{ secrets.CONNECTORS_QA_MANAGER_SLACK_GROUP_ID }} :wave:"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The pull request <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}> is ready to be tested :boom:"
                  }
                }
              ]
            }

  build-qa-images:
    name: Build & publish QA Docker images
    # gcp runner to match the heavier Maven + multi-arch Docker build in DEPLOY_SNAPSHOTS
    runs-on: gcp-core-2-default
    permissions:
      contents: read
    if: |
      github.event.pull_request.state != 'closed' &&
      github.event.label.name == 'qa:required'
    steps:
      - uses: actions/checkout@v6
        with:
          # build the PR's actual code, not the synthetic merge ref
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false # we rely on step outputs, no need for environment variables
          secrets: |
            secret/data/products/connectors/ci/nexus USER | CI_NEXUS_USR;
            secret/data/products/connectors/ci/nexus PASSWORD | CI_NEXUS_PSW;
            secret/data/products/connectors/ci/common ARTIFACTORY_USR | CI_HARBOR_USR;
            secret/data/products/connectors/ci/common ARTIFACTORY_PSW | CI_HARBOR_PSW;
            secret/data/products/connectors/ci/common REGISTRY_MINIMUS_PSW;
            secret/data/products/connectors/ci/common GITHUB_APP_ID;
            secret/data/products/connectors/ci/common GITHUB_APP_PRIVATE_KEY;

      - name: Generate a GitHub token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.secrets.outputs.GITHUB_APP_ID }}
          private-key: ${{ steps.secrets.outputs.GITHUB_APP_PRIVATE_KEY }}

      - name: Restore cache
        uses: actions/cache@v5
        continue-on-error: true # cache failures should not fail the build
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.0.9'

      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml
      - name: 'Create settings.xml'
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
               "id": "camunda-nexus",
               "username": "${{ steps.secrets.outputs.CI_NEXUS_USR }}",
               "password": "${{ steps.secrets.outputs.CI_NEXUS_PSW }}"
             }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "*,!shibboleth,!confluent", "name": "camunda Nexus"}]'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install element templates CLI
        run: npm install --global element-templates-cli

      # Skip tests AND checks: QA just needs runnable images, not verification
      - name: Package Connectors (skip tests & checks)
        env:
          PROJECTS: connector-runtime/connector-runtime-application,bundle/default-bundle,bundle/camunda-saas-bundle
        run: ./mvnw -B compile generate-sources package -DskipTests -DskipChecks --projects "${PROJECTS}" --also-make

      - name: Compute image tag
        id: tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BASE_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE_VERSION="${BASE_VERSION%-SNAPSHOT}"
          TAG="${BASE_VERSION}-pr${PR_NUMBER}-run${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          echo "::notice::QA image tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'arm64,arm'

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: registry.camunda.cloud
          username: ${{ steps.secrets.outputs.CI_HARBOR_USR }}
          password: ${{ steps.secrets.outputs.CI_HARBOR_PSW }}

      - name: Login to Minimus
        uses: docker/login-action@v4
        with:
          registry: reg.mini.dev
          username: minimus
          password: ${{ steps.secrets.outputs.REGISTRY_MINIMUS_PSW }}

      - name: Build and Push Docker Image - connector-runtime
        uses: docker/build-push-action@v7
        with:
          context: connector-runtime/connector-runtime-application/
          push: true
          tags: registry.camunda.cloud/team-connectors/connectors:${{ steps.tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          provenance: false

      - name: Build and Push Docker Image - bundle-default
        uses: docker/build-push-action@v7
        with:
          context: bundle/default-bundle/
          push: true
          tags: registry.camunda.cloud/team-connectors/connectors-bundle:${{ steps.tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          provenance: false

      - name: Build and Push Docker Image - bundle-saas
        uses: docker/build-push-action@v7
        with:
          context: bundle/camunda-saas-bundle/
          push: true
          tags: registry.camunda.cloud/team-connectors/connectors-bundle-saas:${{ steps.tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          provenance: false

      # github-script (Node) instead of gh CLI: the gcp runner has no gh binary
      - name: Comment image tags on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const reg = 'registry.camunda.cloud/team-connectors';
            const body = [
              ':whale: QA Docker images published to Harbor:',
              '- `' + reg + '/connectors:' + tag + '`',
              '- `' + reg + '/connectors-bundle:' + tag + '`',
              '- `' + reg + '/connectors-bundle-saas:' + tag + '`',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body,
            });
