on:
  push:
    # Trigger the workflow on push to main, self-managed and feature branches.
    branches:
      - "main"
      - "feature/**"
      - "self-managed/**"
  pull_request:
    # Trigger the workflow on pull requests
    branches:
      - "**"

# Will limit the workflow to 1 concurrent run per ref (branch)
# If a new commits occurs, the current run will be canceled
# Exception for the main branch to run concurrently per commit, meaning every commit runs through
# reasoning is that canceling main hinders the release process
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && github.sha || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

name: build-and-test
jobs:
  filter-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      needs-restapi-build: 'true'
      needs-webapp-build: 'true'
      needs-e2e-build: 'true'
      needs-restapi-tests: ${{ steps.filter.outputs.restapi }}
      needs-webapp-tests: ${{ steps.filter.outputs.webapp }}
      needs-e2e-tests: ${{ steps.filter.outputs.restapi == 'true' || steps.filter.outputs.webapp == 'true' || steps.filter.outputs.e2e == 'true' }}
      needs-asset-refresh-test: ${{ steps.filter.outputs.webapp == 'true' && ((github.event_name == 'push' && !startsWith(github.ref_name, 'self-managed/')) || (github.event_name == 'pull_request' && !startsWith(github.base_ref, 'self-managed/'))) }}
      needs-saas-build: ${{ (github.event_name == 'push' && !startsWith(github.ref_name, 'self-managed/')) || (github.event_name == 'pull_request' && !startsWith(github.base_ref, 'self-managed/')) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            restapi:
              - 'restapi/**'
            webapp:
              - 'webapp/**'
            e2e:
              - 'e2e/**'
              - 'docker-compose.*'

  build:
    name: build-${{ matrix.build.name }}-${{ matrix.product_context }}
    needs:
      - filter-changes
    runs-on: gcp-core-4-default
    permissions:
      id-token: write # ID Token to authenticate with GCP
      contents: read
    strategy:
      fail-fast: false # in case a self-hosted runner is preempted not the whole workflow has to be rerun
      matrix:
        product_context:
          - saas
          - self-managed
        build:
          - name: restapi
            make_targets: restapi-package${{ (github.ref_name != 'main' && !startsWith(github.ref, 'refs/tags/')) && '-dev' || '' }}
            java_version: 21.0.10
            directory: restapi
          - name: webapp
            make_targets: prepare-ci-webapp-build webapp-lint webapp-tsc webapp-build install-webapp-production
            node_version: 22.23.1
            directory: webapp
          - name: webapp-e2e
            make_targets: prepare-ci-webapp-build webapp-build-e2e install-webapp-production
            node_version: 22.23.1
            directory: webapp
        exclude:
          - build:
              name: ${{ needs.filter-changes.outputs.needs-restapi-build == 'true' && 'dummy' || 'restapi' }}
          - build:
              name: ${{ needs.filter-changes.outputs.needs-webapp-build == 'true' && 'dummy' || 'webapp' }}
          - build:
              name: ${{ needs.filter-changes.outputs.needs-e2e-build == 'true' && 'dummy' || 'webapp-e2e' }}
          - product_context: ${{ needs.filter-changes.outputs.needs-saas-build == 'true' && '-' || 'saas' }}
    timeout-minutes: 25
    steps:
      #########################################################################
      # Setup: import secrets from vault
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_PASSWORD;
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_USER;
            secret/data/products/web-modeler/ci/common CAMUNDA_NEXUS_PASSWORD;
            secret/data/products/web-modeler/ci/common CAMUNDA_NEXUS_USER;
            secret/data/products/web-modeler/ci/common CAMUNDA_GITHUB_TOKEN;
            secret/data/products/web-modeler/ci/common REGISTRY_MINIMUS_PSW;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_USR;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_PSW;
      #########################################################################
      # Setup: checkout code
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Setup: Authenticate to Docker Hub and Camunda Docker registry
      - name: Log in to Docker Hub registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            username: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_USR }}
            password: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_PSW }}
      - name: Log in to Camunda Docker registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            registry: registry.camunda.cloud
            username: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_USER }}
            password: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_PASSWORD }}
      - name: Log in to Minimus Docker registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            registry: reg.mini.dev
            username: minimus
            password: ${{ steps.secrets.outputs.REGISTRY_MINIMUS_PSW }}
      #########################################################################
      # Detect changes to enable skipping workflow
      - name: Detect cached image from previous builds
        id: docker-cache
        uses: ./.github/actions/check-docker-cache
        with:
          detect_changes_in: ${{ matrix.build.directory }}
          image_name: modeler-${{ matrix.build.name }}-${{ matrix.product_context }}
          commit_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      #########################################################################
      # Setup: Java environment (conditionally)
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        name: Setup Java environment
        if: ${{ matrix.build.java_version && steps.docker-cache.outputs.result == 'miss' }}
        with:
          cache: maven
          cache-dependency-path: |
            restapi/pom.xml
            restapi/build-tools/pom.xml
            restapi/common/pom.xml
            restapi/publicapi/pom.xml
            restapi/${{ matrix.product_context }}/pom.xml
          distribution: temurin
          java-version: ${{ matrix.build.java_version }}
      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        if: ${{ matrix.build.java_version }}
        with:
          maven-version: 3.9.6
      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml
      - name: 'Create settings.xml'
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        if: ${{ matrix.build.java_version }}
        with:
          githubServer: false
          servers: |
            [{
              "id": "camunda-nexus",
              "username": "${{ steps.secrets.outputs.CAMUNDA_NEXUS_USER }}",
              "password": "${{ steps.secrets.outputs.CAMUNDA_NEXUS_PASSWORD }}"
            }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "camunda-nexus", "name": "camunda Nexus"}]'
      #########################################################################
      # Install build tooling
      - name: Install build tooling
        run: |
          sudo apt update && sudo apt install -y make
      #########################################################################
      # Check dependencies licenses
      - name: Check dependencies licenses
        uses: ./.github/actions/check-webapp-dependencies
        if: ${{ matrix.build.node_version && steps.docker-cache.outputs.result == 'miss' }}
      #########################################################################
      # Setup: Node.js environment (conditionally)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Setup Node.js environment
        if: ${{ matrix.build.node_version && steps.docker-cache.outputs.result == 'miss' }}
        with:
          node-version: ${{ matrix.build.node_version }}
          cache: 'npm'
          cache-dependency-path: 'webapp/package-lock.json'
      #########################################################################
      # Perform build
      - name: Perform ${{ matrix.build.name }} build
        run: PRODUCT_CONTEXT=${{ matrix.product_context }} make ${{ matrix.build.make_targets }}
        env:
          CAMUNDA_NEXUS_PASSWORD: ${{ steps.secrets.outputs.CAMUNDA_NEXUS_PASSWORD }}
          CAMUNDA_NEXUS_USER: ${{ steps.secrets.outputs.CAMUNDA_NEXUS_USER }}
        if: ${{ steps.docker-cache.outputs.result == 'miss' }}
      #########################################################################
      # Build and push Docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: ${{ steps.docker-cache.outputs.result == 'miss' }}
        with:
          platforms: linux/amd64,linux/arm64
      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: ${{ steps.docker-cache.outputs.result == 'miss' }}
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.build.name }}-${{ matrix.product_context }}-${{ github.event.pull_request.head.sha || github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.build.name }}-${{ matrix.product_context }}-
      - name: Build Docker image
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        if: ${{ steps.docker-cache.outputs.result == 'miss' }}
        with:
          action: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            build-args: PRODUCT_CONTEXT=${{ matrix.product_context }}
            cache-from: type=local,src=/tmp/.buildx-cache
            cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new
            context: .
            file: ${{ matrix.build.directory }}/Dockerfile
            platforms: linux/amd64,linux/arm64
            provenance: false
            push: true
            tags: |
              ${{ env.DOCKER_HARBOR_CI_TAG }}
              ${{ env.DOCKER_HARBOR_PR_TAG }}
              ${{ env.DOCKER_HARBOR_CACHE_TAG }}
              ${{ github.ref_name == 'main' && env.DOCKER_HARBOR_LATEST_TAG || '' }}
              ${{ github.ref_name == 'main' && matrix.product_context == 'self-managed' && env.DOCKER_HARBOR_SNAPSHOT_TAG || '' }}
              ${{ github.ref_name == 'main' && matrix.product_context == 'self-managed' && env.DOCKER_HUB_SNAPSHOT_TAG || '' }}
              ${{ startsWith(github.ref_name, 'self-managed/') && matrix.product_context == 'self-managed' && env.DOCKER_HARBOR_SELF_MANAGED_BRANCH_SNAPSHOT_TAG || '' }}
              ${{ startsWith(github.ref_name, 'self-managed/') && matrix.product_context == 'self-managed' && env.DOCKER_HUB_SELF_MANAGED_BRANCH_SNAPSHOT_TAG || '' }}
      - name: Move cache
        if: ${{ steps.docker-cache.outputs.result == 'miss' }}
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      #########################################################################
      # GCR specific for Camunda Cloud
      # kubectl is not needed but required by the action by SRE
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        if: ${{ matrix.product_context == 'saas' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/prerelease/') || startsWith(github.ref, 'refs/heads/release/')) }}
      - name: Authenticate to GAR
        uses: camunda/action-google-auth@ce81e4e8ba79b3330d8a4277e517cb65daa68de2 # v2.3.2
        id: auth
        if: ${{ matrix.product_context == 'saas' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/prerelease/') || startsWith(github.ref, 'refs/heads/release/')) }}
        with:
          account-alias: registry
      - name: Get Docker image tag prefix
        id: get-tag-prefix
        if: ${{ matrix.product_context == 'saas' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/prerelease/') || startsWith(github.ref, 'refs/heads/release/')) }}
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/heads/release/.*$ ]]; then
            prefix="release"
          elif [[ "${{ github.ref }}" =~ ^refs/heads/prerelease/.*$ ]]; then
            prefix="prerelease"
          else
            prefix="ci"
          fi
          echo "prefix=$prefix" >> $GITHUB_OUTPUT
      - name: Tag and push to GCR
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        if: ${{ matrix.product_context == 'saas' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/prerelease/') || startsWith(github.ref, 'refs/heads/release/')) }}
        with:
          attempt_limit: 5
          attempt_delay: 15000
          command: |
            docker pull ${DOCKER_HARBOR_CI_TAG}
            docker tag ${DOCKER_HARBOR_CI_TAG} ${DOCKER_GCR_TAG}
            docker push ${DOCKER_GCR_TAG}
        env:
          DOCKER_GCR_TAG: ${{ steps.auth.outputs.registry }}/modeler/modeler-${{ matrix.build.name }}:${{ steps.get-tag-prefix.outputs.prefix }}-${{ github.sha }}
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: build-${{ matrix.build.name }}-${{ matrix.product_context }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  e2e-test:
    name: e2e-test-${{ matrix.product_context }}-${{ matrix.containers }}
    runs-on: gcp-core-4-longrunning
    if: ${{ needs.filter-changes.outputs.needs-e2e-tests == 'true' }}
    needs:
      - build
      - filter-changes
    strategy:
      fail-fast: false
      matrix:
        product_context:
          - saas
          - self-managed
        containers:
          - 0
          - 1
          - 2
          - 3
        exclude:
          - product_context: ${{ needs.filter-changes.outputs.needs-saas-build == 'true' && '-' || 'saas' }}
    timeout-minutes: 40
    steps:
      #########################################################################
      # Install build tooling (make + netcat + xvfb requirements)
      - name: Install build tooling
        run: |
          sudo apt update && sudo apt install -y make netcat-openbsd libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb
      #########################################################################
      # Setup: import secrets from vault
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_PASSWORD;
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_USER;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_PSW_READ_ONLY;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_USR;
      #########################################################################
      # Setup: Check out code
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      #########################################################################
      # Setup: Authenticate to Docker Hub and Camunda Docker registry
      - name: Log in to Docker Hub registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            username: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_USR }}
            password: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_PSW_READ_ONLY }}
      - name: Log in to Camunda Docker registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            registry: registry.camunda.cloud
            username: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_USER }}
            password: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_PASSWORD }}
      #########################################################################
      # Setup: Node.js environment
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Setup Node.js environment
        with:
          node-version: 22.23.1
          cache: 'npm'
          cache-dependency-path: 'e2e/package-lock.json'
      #########################################################################
      # Spin up docker-compose with all containers to run the app
      - uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        name: Start Web Modeler with docker-compose
        with:
          attempt_limit: 5
          attempt_delay: 15000
          command: make -C e2e docker-compose-e2e-${{ matrix.product_context }}
        env:
          COMMIT_SHA: ci-${{ github.event.pull_request.head.sha || github.sha }}
      #########################################################################
      # Wait for the app to be up and running
      - name: Wait until host and port are available
        run: timeout 120 sh -c 'until nc -z $0 $1; do sleep 2; done' localhost 8070
      - name: Check Docker
        run: docker ps -a
      #########################################################################
      # Execute the Cypress tests
      - name: Run cypress
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        env:
          SPLIT: 4
          SPLIT_INDEX: ${{ matrix.containers }}
          SPLIT_FILE: 'cypress/timings-${{ matrix.product_context }}.json'
        with:
          working-directory: ./e2e
          browser: chrome
          headed: false
          command: make e2e-test-${{ matrix.product_context }}
          # we don't need Cypress own runner summary
          publish-summary: false
      #########################################################################
      # Upload cypress split timings file
      - name: Upload cypress split timings file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: e2e-timings-${{ matrix.product_context }}-${{ matrix.containers }}
          path: ./e2e/cypress/timings-${{ matrix.product_context }}.json
          retention-days: 1
      #########################################################################
      # Collect and upload logs from docker and cypress
      - name: Collect docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@2741064ab9d7af54b0b1ffb6076cf64c16f0220e # v2.2.2
        with:
          dest: "./logs/e2e-test"
      - name: Upload logs to GitHub
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-docker-compose-logs-${{ matrix.product_context }}-${{ matrix.containers }}
          path: ./logs
      - name: Upload Screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: e2e-test-screenshots-${{ matrix.product_context }}-${{ matrix.containers }}
          path: ./e2e/cypress/screenshots
      - name: Upload Videos
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: e2e-test-videos-${{ matrix.product_context }}-${{ matrix.containers }}
          path: ./e2e/cypress/videos
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: e2e-test-${{ matrix.product_context }}-${{ matrix.containers }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  e2e-merge-split-timings:
    name: e2e-merge-split-timings-${{ matrix.product_context }}
    needs:
      - filter-changes
      - e2e-test
    strategy:
      matrix:
        product_context:
          - saas
          - self-managed
        exclude:
          - product_context: ${{ needs.filter-changes.outputs.needs-saas-build == 'true' && '-' || 'saas' }}
    outputs:
      timings: ${{ steps.merge.outputs.merged-timings }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        with:
          runTests: false
          working-directory: ./e2e
      - name: Download artifacts
        id: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: split-results
      - name: Display structure of downloaded files
        run: ls -R split-results
      - name: Merge split timings
        id: merge
        run: |
          npm exec --prefix=e2e -- cypress-split-merge \
            --parent-folder split-results \
            --split-file timings-${{ matrix.product_context }}.json \
            --output ./e2e/cypress/timings-${{ matrix.product_context }}.json \
            --set-gha-output merged-timings
      - name: Print timings
        run: |
          echo off
          echo Merged timings
          echo '${{ steps.merge.outputs.merged-timings }}'
      - name: Upload cypress merged timings file
