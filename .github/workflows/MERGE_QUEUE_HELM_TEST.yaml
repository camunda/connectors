  restapi-test:
    name: restapi-test-${{ matrix.product_context }}
    runs-on: gcp-core-8-default
    if: ${{ needs.filter-changes.outputs.needs-restapi-tests == 'true' }}
    needs: filter-changes
    strategy:
      matrix:
        product_context:
          - saas
          - self-managed
        exclude:
          - product_context: ${{ needs.filter-changes.outputs.needs-saas-build == 'true' && '-' || 'saas' }}
    timeout-minutes: 45
    steps:
      #########################################################################
      # Install build tooling
      - name: Install build tooling
        run: |
          sudo apt update && sudo apt install -y make
      #########################################################################
      # Setup: import secrets from vault
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/common CAMUNDA_NEXUS_PASSWORD;
            secret/data/products/web-modeler/ci/common CAMUNDA_NEXUS_USER;
      #########################################################################
      # Setup: Check out code
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      #########################################################################
      # Setup: Java environment (nexus credentials needed for the license checker)
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        name: Setup Java with NEXUS credentials
        with:
          cache: maven
          cache-dependency-path: |
            restapi/pom.xml
            restapi/build-tools/pom.xml
            restapi/common/pom.xml
            restapi/publicapi/pom.xml
            restapi/${{ matrix.product_context }}/pom.xml
          distribution: temurin
          java-version: 21.0.10
      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: 3.9.6
      # Use CI Nexus as co-located pull-through cache for Maven artifacts via ~/.m2/settings.xml
      - name: 'Create settings.xml'
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          githubServer: false
          servers: |
            [{
              "id": "camunda-nexus",
              "username": "${{ steps.secrets.outputs.CAMUNDA_NEXUS_USER }}",
              "password": "${{ steps.secrets.outputs.CAMUNDA_NEXUS_PASSWORD }}"
            }]
          mirrors: '[{"url": "https://repository.nexus.camunda.cloud/content/groups/internal/", "id": "camunda-nexus", "mirrorOf": "camunda-nexus", "name": "camunda Nexus"}]'
      #########################################################################
      # Run restapi tests
      - name: Run restapi tests
        run: TEST_SPRING_PROFILES_ACTIVE=test-postgresql make restapi-test-${{ matrix.product_context }}
        env:
          CAMUNDA_NEXUS_PASSWORD: ${{ steps.secrets.outputs.CAMUNDA_NEXUS_PASSWORD }}
          CAMUNDA_NEXUS_USER: ${{ steps.secrets.outputs.CAMUNDA_NEXUS_USER }}
      #########################################################################
      # Collect and upload logs from unit and integration tests
      - name: Upload restapi test reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: restapi-test-reports-${{ matrix.product_context }}
          path: |
            ./restapi/*/target/surefire-reports
            ./restapi/*/target/failsafe-reports
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: restapi-test-${{ matrix.product_context }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  restapi-test-dummy:
    name: restapi-test-${{ matrix.product_context }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: ${{ needs.filter-changes.outputs.needs-restapi-tests == 'false' }}
    needs: filter-changes
    strategy:
      matrix:
        product_context:
          - saas
          - self-managed
        exclude:
          - product_context: ${{ needs.filter-changes.outputs.needs-saas-build == 'true' && '-' || 'saas' }}
    steps:
      - name: Dummy step
        run: echo "This is a dummy step to avoid a job failure due to missing required check"

  asset-refresh-test:
    name: asset-refresh-test (from ${{ matrix.migrations.from}} to ${{matrix.migrations.to}})
    runs-on: gcp-core-4-default
    if: ${{ needs.filter-changes.outputs.needs-asset-refresh-test == 'true' }}
    needs:
      - build
      - filter-changes
    strategy:
      matrix:
        migrations:
          - from: ci-${{ github.event.pull_request.head.sha || github.sha }}
            to: prod
          - from: prod
            to: ci-${{ github.event.pull_request.head.sha || github.sha }}
    timeout-minutes: 20
    steps:
      #########################################################################
      # Install build tooling
      - name: Install build tooling
        run: |
          sudo apt update && sudo apt install -y make
      #########################################################################
      # Setup: import secrets from vault
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_USER;
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_PASSWORD;
            secret/data/products/web-modeler/ci/common PLAYWRIGHT_SAAS_USER_NAME;
            secret/data/products/web-modeler/ci/common PLAYWRIGHT_SAAS_USER_PASSWORD;
      #########################################################################
      # Setup: Check out code and authenticate to docker and GitHub package registry
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            registry: registry.camunda.cloud
            username: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_USER }}
            password: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_PASSWORD }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Setup Node.js environment
        with:
          node-version: 22.23.1
          cache: 'npm'
          cache-dependency-path: 'e2e-playwright/package-lock.json'
      - name: Install npm dependencies
        run: ( cd e2e-playwright; npm ci )
      - name: Install Playwright dependencies
        run: ( cd e2e-playwright; npx playwright install --with-deps --only-shell )
      - name: Run asset-refresh-test
        run: make -C e2e-playwright asset-refresh-test VERSION_FROM=${{ matrix.migrations.from }} VERSION_TO=${{ matrix.migrations.to }}
        env:
          PLAYWRIGHT_SAAS_USER_NAME: ${{ steps.secrets.outputs.PLAYWRIGHT_SAAS_USER_NAME }}
          PLAYWRIGHT_SAAS_USER_PASSWORD: ${{ steps.secrets.outputs.PLAYWRIGHT_SAAS_USER_PASSWORD }}
      #########################################################################
      # Collect and upload logs from docker and cypress
      - name: Collect Docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@2741064ab9d7af54b0b1ffb6076cf64c16f0220e # v2.2.2
        with:
          dest: "./logs/asset-refresh-test-${{matrix.migrations.from}}"
      - name: Upload Docker logs to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: asset-refresh-test-docker-logs-${{matrix.migrations.from}}
          path: ./logs
      - name: Upload Playwright artifacts to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: asset-refresh-test-playwright-report-${{matrix.migrations.from}}
          path: ./e2e-playwright/playwright-report/
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: asset-refresh-test (from ${{ matrix.migrations.from}} to ${{matrix.migrations.to}})
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}


  # Tests that the Docker images for Self-Managed
  #   - are multi-arch images that can be started successfully on both amd64 and arm64 architectures
  #   - can be started with a random non-root user (to ensure OpenShift compatibility)
  docker-images-self-managed-test:
    strategy:
      matrix:
        include:
          - architecture: amd64
            runs-on: gcp-core-2-default
          - architecture: arm64
            runs-on: aws-arm-core-2-default
    name: docker-images-self-managed-test-${{ matrix.architecture }}
    runs-on: ${{ matrix.runs-on }}
    needs:
      - build
    timeout-minutes: 8
    env:
      COMMIT_SHA: ci-${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install make
        run: sudo apt update && sudo apt install -y make
      - name: Import secrets from Vault
        id: secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_PASSWORD;
            secret/data/products/web-modeler/ci/common CAMUNDA_CONTAINER_REGISTRY_USER;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_PSW_READ_ONLY;
            secret/data/products/web-modeler/ci/web-modeler REGISTRY_HUB_DOCKER_COM_USR;
      - name: Log in to Docker Hub registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            username: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_USR }}
            password: ${{ steps.secrets.outputs.REGISTRY_HUB_DOCKER_COM_PSW_READ_ONLY }}
      - name: Log in to Camunda Docker registry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
          attempt_limit: 5
          attempt_delay: 15000
          with: |
            registry: registry.camunda.cloud
            username: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_USER }}
            password: ${{ steps.secrets.outputs.CAMUNDA_CONTAINER_REGISTRY_PASSWORD }}
      - name: Pull Docker images
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          attempt_limit: 5
          attempt_delay: 15000
          command: |
            docker pull registry.camunda.cloud/web-modeler/modeler-restapi-self-managed:$COMMIT_SHA
            docker pull registry.camunda.cloud/web-modeler/modeler-webapp-self-managed:$COMMIT_SHA
      - name: Check Docker image architecture
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          fail=false
          for component in restapi webapp; do
            actualArchitecture=$(docker inspect --format="{{.Architecture}}" registry.camunda.cloud/web-modeler/modeler-$component-self-managed:$COMMIT_SHA)
            if [[ "$actualArchitecture" != "$EXPECTED_ARCHITECTURE" ]]; then
              echo "$component Docker image has wrong architecture (expected: $EXPECTED_ARCHITECTURE, actual: $actualArchitecture)"
              fail=true
            fi
          done
          if $fail; then
            exit 1
          fi
      - name: Generate random user ID
        id: generate-id
        run: echo "uid=10000$RANDOM" >> $GITHUB_OUTPUT
      - uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        name: Start Web Modeler with docker-compose
        with:
          attempt_limit: 5
          attempt_delay: 15000
          # will wait until all containers are healthy
          command: make -C e2e docker-compose-e2e-self-managed
        env:
          # random user ID + root group ID (0)
          CONTAINER_USER: ${{ steps.generate-id.outputs.uid }}:0
      - name: Verify Docker container user IDs
        env:
          EXPECTED_UID: ${{ steps.generate-id.outputs.uid }}
        run: |
          for container_name in "modeler-restapi" "modeler-webapp"; do
            container_uid=$(docker exec $container_name /usr/bin/id -u)
            echo "$container_name: $container_uid"
            if [[ "$container_uid" != "$EXPECTED_UID" ]]; then
              echo "UID of container $container_name is $container_uid but should be $EXPECTED_UID"
              exit 1
            fi
          done
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: docker-images-self-managed-test-${{ matrix.architecture }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}

  format-identifier:
    name: Format Identifier
    if: ${{ github.event_name == 'pull_request' }}
    permissions: {}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      identifier: ${{ steps.format.outputs.identifier }}
    steps:
      - name: Format identifier
        id: format
        shell: bash
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IDENTIFIER="web-modeler-helm-${{ github.run_id }}-${SHA_SHORT}"
          IDENTIFIER="${IDENTIFIER:0:40}"
          echo "identifier=${IDENTIFIER}" >> "$GITHUB_OUTPUT"
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          job_name: build-and-test-format-identifier
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}

  helm-e2e-tests:
    name: Helm Chart Integration & E2E Tests
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - build
      - filter-changes
      - docker-images-self-managed-test
      - format-identifier
    uses: camunda/camunda-platform-helm/.github/workflows/test-integration-template.yaml@main
    secrets: inherit
    with:
      identifier: ${{ needs.format-identifier.outputs.identifier }}
      platforms: gke
      camunda-helm-git-ref: main
      camunda-helm-dir: camunda-platform-8.7
      namespace-prefix: webmodeler
      test-enabled: true
      e2e-enabled: true
      always-delete-namespace: true
      flows: install
      scenario: keycloak-original
      shortname: kcor
      extra-values: |
        webModeler:
          restapi:
            image:
              registry: registry.camunda.cloud
              repository: web-modeler/modeler-restapi-self-managed
              digest: ""
              tag: ci-${{ github.event.pull_request.head.sha || github.sha }}
          webapp:
            image:
              registry: registry.camunda.cloud
              repository: web-modeler/modeler-webapp-self-managed
              digest: ""
              tag: ci-${{ github.event.pull_request.head.sha || github.sha }}
          websockets:
            image:
              registry: registry.camunda.cloud
              repository: web-modeler/modeler-websockets
              digest: ""
              tag: latest
      vault-secret-mapping: |
        secret/data/products/zeebe/ci/zeebe REGISTRY_HUB_DOCKER_COM_USR | TEST_DOCKER_USERNAME;
        secret/data/products/zeebe/ci/zeebe REGISTRY_HUB_DOCKER_COM_PSW | TEST_DOCKER_PASSWORD;
        secret/data/github.com/organizations/camunda NEXUS_USR | TEST_DOCKER_USERNAME_CAMUNDA_CLOUD;
        secret/data/github.com/organizations/camunda NEXUS_PSW | TEST_DOCKER_PASSWORD_CAMUNDA_CLOUD;
 
  helm-tests-debug-summary:
    name: AlwaysGreen failure feedback (Helm)
    needs: helm-e2e-tests
    if: ${{ always() && needs.helm-e2e-tests.result == 'failure' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Import Slack token
        id: slack-secrets
        continue-on-error: true
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/web-modeler/ci/web-modeler WEB_MODELER_SLACK_BOT_USER_TOKEN;
      # Standardised AlwaysGreen feedback → job summary + PR comment + the existing
      # AlwaysGreen alerting channel (#alwaysgreen-reliability, same as the streak
      # detector). PR-based, so the in-repo GITHUB_TOKEN comments directly. Best-effort.
      - name: Post AlwaysGreen failure feedback
        continue-on-error: true
        uses: camunda/c8-cross-component-e2e-tests/.github/actions/post-failure-feedback@main
        with:
          failure_category: unknown
          stage: helm-integration
          owner_team: "@camunda/web-modeler"
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status: failure
          evidence: "Helm Chart Integration & E2E Tests failed."
          pr: ${{ github.event.pull_request.number }}
          slack_channel: "C0AK0AVKRL0"
          slack_bot_token: ${{ steps.slack-secrets.outputs.WEB_MODELER_SLACK_BOT_USER_TOKEN }}
          github_token: ${{ github.token }}
      - name: Observe build status
        if: always()
        continue-on-error: true
        uses: ./.github/actions/observe-build-status
        with:
          build_status: ${{ job.status }}
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
  deploy-camunda-cloud-dev:
    name: "Deploy: dev"
    uses: ./.github/workflows/template-deploy.yml
    needs:
      # Deploy to dev early, without SQL database backups.
      - build
    if: ${{ github.ref == 'refs/heads/main' }}
    with:
      alias: dev/main
      docker_tag: ci-${{ github.sha }}
      vault_secret_key: secret/data/products/web-modeler/ci/web-modeler
      cloudflare_zone_id: e7cd453e07e4fb80bf27f71599f408f7 # ultrawombat.com
    secrets:
      vault_addr: ${{ secrets.VAULT_ADDR }}
      vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
      vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}

  backup-database-int:
    name: "Backup database: int"
    uses: ./.github/workflows/backup-database.yml
    needs:
      # Do the backup only if the tests are passing.
      - e2e-test
      - webapp-test
      - restapi-test
      - asset-refresh-test
    if: ${{ github.ref == 'refs/heads/main' && !failure() && !cancelled() }}
    with:
      instance: modeler
      account_alias: int
      vault_secret_key: secret/data/products/web-modeler/ci/web-modeler

      # Backups are rate-limited. If the project is deployed to integration
      # "too often" in a row, don't fail the deployment because a backup
      # failed, and continue instead.
      # A backup will be missing, but there were probably several available just before.
      # See: https://cloud.google.com/sql/docs/postgres/backup-recovery/backups#backup_rate_limitations
      allow_failure: true
    secrets:
      vault_addr: ${{ secrets.VAULT_ADDR }}
      vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
      vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}

  deploy-camunda-cloud-int:
    name: "Deploy: int"
    uses: ./.github/workflows/template-deploy.yml
    needs:
      # Deploy only once the backup has been completed
      - backup-database-int
    if: ${{ github.ref == 'refs/heads/main' && !failure() && !cancelled() }}
    with:
      alias: int/main
      docker_tag: ci-${{ github.sha }}
      vault_secret_key: secret/data/products/web-modeler/ci/web-modeler
      cloudflare_zone_id: e7cd453e07e4fb80bf27f71599f408f7 # ultrawombat.com
      environment: int
    secrets:
      vault_addr: ${{ secrets.VAULT_ADDR }}
      vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
      vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}

  # Rerun failed jobs running on self-hosted runners in case of network issues or node preemption
  rerun-failed-jobs:
    needs:
      - build
      - e2e-test
      - webapp-test
      - restapi-test
      - asset-refresh-test
      - docker-images-self-managed-test
      - helm-e2e-tests
    if: failure() && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-24.04
    steps:
      - name: Retrigger job
        uses: camunda/infra-global-github-actions/rerun-failed-run@main
        with:
          error-messages: |
            lost communication with the server
            The runner has received a shutdown signal
          run-id: ${{ github.run_id }}
          repository: ${{ github.repository }}
          vault-addr: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

  # Check jobs running on self-hosted runners for cancellations and submit
  # CI Analytics data in case of network issues or node preemption
  check-results:
    # New test jobs must be added to the `needs` lists!
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs:
      - build
      - e2e-test
      - webapp-test
      - restapi-test
      - asset-refresh-test
      - docker-images-self-managed-test
      - helm-e2e-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for aborted jobs
        continue-on-error: true
        uses: ./.github/actions/observe-aborted-jobs
        with:
          secret_vault_address: ${{ secrets.VAULT_ADDR }}
          secret_vault_roleId: ${{ secrets.VAULT_ROLE_ID }}
          secret_vault_secretId: ${{ secrets.VAULT_SECRET_ID }}
