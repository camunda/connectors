# Model capability matrix for the agentic-ai connector.
#
# This file is loaded as a low-precedence Spring PropertySource by
# `AgenticAiCapabilitiesConfiguration#setEnvironment` when the configuration
# bean is instantiated. Library consumers can override or extend any value via
# `application.yml` using the same property prefix, no full-file replacement
# required:
#
#   camunda.connector.agenticai.aiagent.capabilities:
#     anthropic-messages:
#       models:
#         claude-opus-4-6-plus:            # map key reused -> override existing entry
#           capabilities:
#             max-output-tokens: 64000     # only this field overridden
#
# Structure under `capabilities`:
#   <api-family>:
#     defaults:    capability block applied to every model entry in the family
#     models:      map of opaque identifiers to entries. Each entry has one of:
#                    - `id`       (defaults to the map key when neither is set)
#                    - `patterns` (a single glob string using `*` only, OR a
#                                  list of glob strings; the entry matches when
#                                  any glob in the list matches, and longest
#                                  match wins at resolve-time)
#                  plus an optional `aliases` list (id entries only), an
#                  optional `backend` string, and a `capabilities` overlay.
#                  NB: `*` and `.` in property keys interfere with Spring Boot's
#                  map binding, so glob characters always live in the
#                  `patterns` field, never in the map key.
#
# `backend` (optional, default unset = backend-agnostic): distinguishes how
# the same model id is served (e.g. `azure-foundry`, `bedrock`) when that
# changes its capabilities (typically context-window). A backend-specific
# entry layers ON TOP OF the backend-agnostic entry matching the same model
# id, which in turn layers on top of the family `defaults` — see "Resolution
# chain" below. `backend` is orthogonal to the `id`/`patterns` discriminator
# and may be combined with either.
#
# Merge semantics (Spring Boot config + capability matrix resolver):
#   * Maps merge recursively (sub-keys of input-modalities / output-modalities
#     are inherited individually)
#   * Lists replace wholesale
#   * Scalars and booleans replace
#
# Granularity: EVERY capability field is per-model overridable via an entry's
# `capabilities` overlay — including each input-modalities location
# (user-message, tool-result). The family `defaults` block is only the
# baseline; a model that genuinely differs (e.g. a model that cannot accept
# image tool results even though its API surface allows them) pins its own
# `input-modalities.tool-result` in its entry. tool-result is left at the
# family default below only because we have no authoritative per-model
# tool-result data yet, and because OpenAI Chat Completions is a hard,
# surface-wide text-only limit (see that family's note) that no model exceeds.
#
# Resolution chain:
#   1. Connector config override (per-call, future)
#   2. Backend-agnostic tier: exact id/alias match, else longest-pattern match,
#      among entries with no `backend`
#   3. Backend-specific tier (only when a backend is given): exact id/alias
#      match, else longest-pattern match, among entries whose `backend`
#      equals the requested one — LAYERED on top of the backend-agnostic tier
#      result (fields it sets win; fields it leaves unset keep the
#      backend-agnostic/family-default value)
#   4. Family defaults (an unmatched model under a known api family still gets
#      that family's `defaults` block, not the fully conservative baseline) —
#      applies when neither tier above found any candidate
#   5. Conservative defaults (text-only, no provider capabilities) — only when
#      the api family itself is unknown
#
# Modality vocabulary: text | image | document | audio | video. Modality lists
# per location (user-message, tool-result, assistant-message) are symmetric.
#
# Curated entries use broad globs on purpose (major-version / family prefixes
# rather than pinned point-release ids) so newer point releases keep matching
# without a matrix update. A broad glob's pinned context-window /
# max-output-tokens must stay accurate for every model it currently matches:
# where matched models genuinely differ, split into narrower patterns/exact
# ids (preferred) or pin the conservative minimum across the matched members —
# never the maximum. See AGENTS.md "Model capability matrix" for the
# maintenance rule and how to refresh this file.
#
# Per-model context-window / max-output-tokens figures below are sourced from
# models.dev (https://models.dev, api.json dataset). Every named entry pins
# both fields explicitly, even when a value equals the family default.
#
# `provider` (optional, per-entry only): an opaque, provider-specific
# capability bag. For anthropic-messages, a reasoning-capable model declares
# `provider.reasoning`:
#
#   provider:
#     reasoning:
#       thinking-modes: [adaptive, disabled]   # ThinkingMode values this model accepts
#       effort-levels:  [low, medium, high, xhigh, max]  # AnthropicEffort values (omit/empty if unsupported)
#
# `reasoning` must NEVER appear in a family `defaults` block: the deep-merge
# cascade cannot un-set a key once set, so a default reasoning block would
# leak into every non-reasoning sibling model. Declare it per-model/glob only.
# A model's absence of `provider.reasoning` (whether via defaults or an entry
# that omits it) means it does not support reasoning.

camunda:
  connector:
    agenticai:
      aiagent:
        capabilities:

          anthropic-messages:
            defaults:
              input-modalities:
                user-message: [text, image, document]
                tool-result:  [text, image, document]
              output-modalities:
                assistant-message: [text]
              context-window: 200000
              max-output-tokens: 8192
            models:
              claude-fable:
                patterns: claude-fable-*
                capabilities:
                  context-window: 1000000
                  max-output-tokens: 128000
                  provider:
                    reasoning:
                      # Always-on thinking (no disabled mode).
                      thinking-modes: [adaptive]
                      effort-levels: [low, medium, high, xhigh, max]
              # Sonnet 5 is dateless (no trailing version segment), so it needs
              # its own pattern rather than falling under claude-sonnet-4-*.
              claude-sonnet-5:
                patterns: claude-sonnet-5*
                capabilities:
                  context-window: 1000000
                  max-output-tokens: 128000
                  provider:
                    reasoning:
                      thinking-modes: [adaptive, disabled]
                      effort-levels: [low, medium, high, xhigh, max]
              claude-opus-4-1:
                patterns: claude-opus-4-1*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 32000
                  provider:
                    reasoning:
                      thinking-modes: [enabled, disabled]
              claude-opus-4-5:
                patterns: claude-opus-4-5*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 64000
                  provider:
                    reasoning:
                      thinking-modes: [enabled, disabled]
                      effort-levels: [low, medium, high, max]
              # opus-4-1/-4-5 (above) are 200k-context releases; opus-4-6 and
              # later moved to the 1M-context tier. Named explicitly (not
              # claude-opus-4-*) so a 200k-tier point release is never swept
              # into the higher figures below.
              claude-opus-4-6-plus:
                patterns: [claude-opus-4-6*, claude-opus-4-7*, claude-opus-4-8*]
                capabilities:
                  context-window: 1000000
                  max-output-tokens: 128000
                  provider:
                    reasoning:
                      thinking-modes: [adaptive, disabled]
                      effort-levels: [low, medium, high, xhigh, max]
              claude-sonnet-4-5:
                patterns: claude-sonnet-4-5*
                capabilities:
                  context-window: 1000000
                  max-output-tokens: 64000
                  provider:
                    reasoning:
                      thinking-modes: [enabled, disabled]
              claude-sonnet-4-6-plus:
                patterns: claude-sonnet-4-6*
                capabilities:
                  context-window: 1000000
                  max-output-tokens: 128000
                  provider:
                    reasoning:
                      thinking-modes: [enabled, adaptive, disabled]
                      effort-levels: [low, medium, high, xhigh, max]
              claude-haiku:
                patterns: claude-haiku-*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 64000
                  provider:
                    reasoning:
                      thinking-modes: [enabled, disabled]

          # Chat Completions tool messages are text-only (the SDK enforces
          # ChatCompletionContentPartText for tool message content arrays);
          # multimodal tool results require the Responses API.
          openai-completions:
            defaults:
              input-modalities:
                user-message: [text, image, document]
                tool-result:  [text]
              output-modalities:
                assistant-message: [text]
              context-window: 128000
              max-output-tokens: 4096
            models:
              # gpt-5* spans a wide range on models.dev (128k-1.05M context,
              # 16k-272k output across chat-latest/base/codex/pro variants);
              # pinned to the conservative floor across the whole matched
              # lineage rather than over-promising for the low-end variants.
              gpt-5:
                patterns: gpt-5*
                capabilities:
                  context-window: 128000
                  max-output-tokens: 16384
                  provider:
                    reasoning:
                      effort-levels: [minimal, low, medium, high]
              gpt-4o:
                patterns: gpt-4o*
                capabilities:
                  context-window: 128000
                  max-output-tokens: 16384
              # gpt-4o-2024-05-13's initial release capped max-output-tokens
              # at 4096, below every later gpt-4o* release; pinned by exact
              # id so it doesn't inherit the higher figure above.
              gpt-4o-2024-05-13:
                capabilities:
                  context-window: 128000
                  max-output-tokens: 4096
              gpt-4-1:
                patterns: gpt-4.1*
                capabilities:
                  context-window: 1047576
                  max-output-tokens: 32768
              o1:
                patterns: o1*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]
              o3:
                patterns: o3*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]
              # o4-mini is the only o4 family member on models.dev (no bare
              # "o4" entry exists). Its input modalities lack PDF/document
              # support, unlike the family default.
              o4:
                patterns: o4*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  input-modalities:
                    user-message: [text, image]
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]

          # Responses API: function call outputs accept text, image and file
          # content items per the SDK's FunctionCallOutput.Output union.
          # Reasoning (provider.reasoning.effort-levels) mirrors the
          # openai-completions declarations above for the same reasoning-
          # capable model families (gpt-5, o-series): reasoning is a model
          # capability, not an API-surface one, so both families declare it
          # identically per model.
          openai-responses:
            defaults:
              input-modalities:
                user-message: [text, image, document]
                tool-result:  [text, image, document]
              output-modalities:
                assistant-message: [text]
              context-window: 128000
              max-output-tokens: 4096
            models:
              # gpt-5* spans a wide range on models.dev (128k-1.05M context,
              # 16k-272k output across chat-latest/base/codex/pro variants);
              # pinned to the conservative floor across the whole matched
              # lineage rather than over-promising for the low-end variants.
              gpt-5:
                patterns: gpt-5*
                capabilities:
                  context-window: 128000
                  max-output-tokens: 16384
                  provider:
                    reasoning:
                      effort-levels: [minimal, low, medium, high]
              gpt-4o:
                patterns: gpt-4o*
                capabilities:
                  context-window: 128000
                  max-output-tokens: 16384
              # gpt-4o-2024-05-13's initial release capped max-output-tokens
              # at 4096, below every later gpt-4o* release; pinned by exact
              # id so it doesn't inherit the higher figure above.
              gpt-4o-2024-05-13:
                capabilities:
                  context-window: 128000
                  max-output-tokens: 4096
              gpt-4-1:
                patterns: gpt-4.1*
                capabilities:
                  context-window: 1047576
                  max-output-tokens: 32768
              o1:
                patterns: o1*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]
              o3:
                patterns: o3*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]
              # o4-mini is the only o4 family member on models.dev (no bare
              # "o4" entry exists). Its input modalities lack PDF/document
              # support, unlike the family default.
              o4:
                patterns: o4*
                capabilities:
                  context-window: 200000
                  max-output-tokens: 100000
                  input-modalities:
                    user-message: [text, image]
                  provider:
                    reasoning:
                      effort-levels: [low, medium, high]
