# Model capability matrix for the agentic-ai connector.
#
# This file is loaded as a low-precedence Spring PropertySource by
# `AgenticAiCapabilitiesConfiguration#setEnvironment` when the configuration
# bean is instantiated. Library consumers can override or extend any value via
# `application.yml` using the same property prefix, no full-file replacement
# required:
#
#   camunda.connector.agenticai.aiagent.framework.capabilities:
#     anthropic-messages:
#       models:
#         claude-opus-4:                  # map key reused -> override existing entry
#           capabilities:
#             max-output-tokens: 64000    # only this field overridden
#
# Structure under `capabilities`:
#   <api-family>:
#     defaults:    capability block applied to every model entry in the family
#     models:      map of opaque identifiers to entries. Each entry has one of:
#                    - `id`     (defaults to the map key when neither is set)
#                    - `pattern` (glob using `*` only; longest match wins at
#                                 resolve-time)
#                  plus an optional `aliases` list (id entries only) and a
#                  `capabilities` overlay.
#                  NB: `*` and `.` in property keys interfere with Spring Boot's
#                  map binding, so glob characters always live in the
#                  `pattern` field, never in the map key.
#
# Merge semantics (Spring Boot config + capability matrix resolver):
#   * Maps merge recursively (sub-keys of input-modalities / output-modalities
#     are inherited individually)
#   * Lists replace wholesale
#   * Scalars and booleans replace
#
# Granularity: EVERY capability field is per-model overridable via an entry's
# `capabilities` overlay — including each input-modalities location
# (user-message, tool-result). The family `defaults` block is only the
# baseline; a model that genuinely differs (e.g. a model that cannot accept
# image tool results even though its API surface allows them) pins its own
# `input-modalities.tool-result` in its entry. tool-result is left at the
# family default below only because we have no authoritative per-model
# tool-result data yet, and because OpenAI Chat Completions is a hard,
# surface-wide text-only limit (see that family's note) that no model exceeds.
#
# Resolution chain:
#   1. Connector config override (per-call, future)
#   2. Exact id or alias match
#   3. Pattern (longest-match wins)
#   4. Conservative defaults (text-only, all flags false)
#
# Modality vocabulary: text | image | document | audio | video. Modality lists per
# location (user-message, tool-result, assistant-message) are symmetric.
#
# Curated entries use broad globs on purpose (major-version / family prefixes
# rather than pinned point-release ids) so newer point releases keep matching
# without a matrix update; each family also keeps a bare `<family>-*` fallback
# so a model that predates any curated entry still gets family-level (not
# fully-conservative) defaults.
#
# Per-model context-window / max-output-tokens figures and reasoning flags
# below are sourced from models.dev (https://models.dev, api.json dataset) as
# of 2026-07-08. Each curated bucket uses the values of the most current
# (highest/newest) model.dev entry matching its glob at the time of sourcing;
# refresh periodically as new point releases ship. Models that don't match any
# curated pattern fall back to the family default, then to fully conservative
# (text-only, all flags false) defaults.

camunda:
  connector:
    agenticai:
      aiagent:
        framework:
          capabilities:

            anthropic-messages:
              defaults:
                input-modalities:
                  user-message: [text, image, document]
                  tool-result:  [text, image, document]
                output-modalities:
                  assistant-message: [text]
                supports-reasoning: false
                supports-reasoning-signature-roundtrip: false
                supports-prompt-caching: true
                supports-parallel-tool-calls: true
                context-window: 200000
                max-output-tokens: 8192
              models:
                # Curated entries pin context-window / max-output-tokens /
                # supports-reasoning from the most current models.dev entry
                # matching the glob; supports-reasoning-signature-roundtrip is
                # a design decision (Anthropic extended-thinking signatures),
                # not sourced from models.dev. Globs are broad so point
                # releases keep matching.
                claude-fable:
                  # Source: models.dev anthropic/claude-fable-5
                  pattern: claude-fable-*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 1000000
                    max-output-tokens: 128000
                # Sonnet 5 is dateless (no trailing version segment), so it needs
                # its own pattern rather than falling under claude-sonnet-4-*.
                claude-sonnet-5:
                  # Source: models.dev anthropic/claude-sonnet-5
                  pattern: claude-sonnet-5*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 1000000
                    max-output-tokens: 128000
                claude-opus-4:
                  # Source: models.dev anthropic/claude-opus-4-8 (most current
                  # opus-4.x entry as of sourcing)
                  pattern: claude-opus-4-*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 1000000
                    max-output-tokens: 128000
                claude-sonnet-4:
                  # Source: models.dev anthropic/claude-sonnet-4-6 (most
                  # current sonnet-4.x entry as of sourcing)
                  pattern: claude-sonnet-4-*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 1000000
                    max-output-tokens: 128000
                claude-haiku:
                  # Source: models.dev anthropic/claude-haiku-4-5. Context
                  # window matches the family default (200000), so it is left
                  # unpinned here.
                  pattern: claude-haiku-*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    max-output-tokens: 64000
                claude-fallback:
                  pattern: claude-*
                  capabilities: {}

            # Chat Completions tool messages are text-only (the SDK enforces
            # ChatCompletionContentPartText for tool message content arrays);
            # multimodal tool results require the Responses API.
            openai-completions:
              defaults:
                input-modalities:
                  user-message: [text, image, document]
                  tool-result:  [text]
                output-modalities:
                  assistant-message: [text]
                supports-reasoning: false
                supports-reasoning-signature-roundtrip: false
                supports-prompt-caching: true
                supports-parallel-tool-calls: true
                context-window: 128000
                max-output-tokens: 4096
              models:
                gpt-5:
                  # Source: models.dev openai/gpt-5.5 (most current gpt-5.x
                  # flagship entry as of sourcing)
                  pattern: gpt-5*
                  capabilities:
                    supports-reasoning: true
                    context-window: 1050000
                    max-output-tokens: 128000
                o1:
                  # Source: models.dev openai/o1
                  pattern: o1*
                  capabilities:
                    supports-reasoning: true
                    supports-parallel-tool-calls: false
                    context-window: 200000
                    max-output-tokens: 100000
                o3:
                  # Source: models.dev openai/o3
                  pattern: o3*
                  capabilities:
                    supports-reasoning: true
                    context-window: 200000
                    max-output-tokens: 100000
                o4:
                  # Source: models.dev openai/o4-mini (no bare "o4" entry
                  # exists; -mini is the only o4 family member). Its input
                  # modalities lack PDF/document support, unlike the family
                  # default.
                  pattern: o4*
                  capabilities:
                    supports-reasoning: true
                    context-window: 200000
                    max-output-tokens: 100000
                    input-modalities:
                      user-message: [text, image]
                gpt-4o:
                  # Source: models.dev openai/gpt-4o. Input modalities
                  # (text/image/pdf) match the family default, so no override
                  # is needed here (previous "audio" claim was not sourced and
                  # has been removed).
                  pattern: gpt-4o*
                  capabilities:
                    max-output-tokens: 16384
                gpt-4-1:
                  # Source: models.dev openai/gpt-4.1
                  pattern: gpt-4.1*
                  capabilities:
                    context-window: 1047576
                    max-output-tokens: 32768
                gpt-fallback:
                  pattern: gpt-*
                  capabilities: {}

            # Responses API: function call outputs accept text, image and file
            # content items per the SDK's FunctionCallOutput.Output union.
            openai-responses:
              defaults:
                input-modalities:
                  user-message: [text, image, document]
                  tool-result:  [text, image, document]
                output-modalities:
                  assistant-message: [text]
                supports-reasoning: false
                supports-reasoning-signature-roundtrip: false
                supports-prompt-caching: true
                supports-parallel-tool-calls: true
                context-window: 128000
                max-output-tokens: 4096
              models:
                gpt-5:
                  # Source: models.dev openai/gpt-5.5 (most current gpt-5.x
                  # flagship entry as of sourcing)
                  pattern: gpt-5*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 1050000
                    max-output-tokens: 128000
                o1:
                  # Source: models.dev openai/o1
                  pattern: o1*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    supports-parallel-tool-calls: false
                    context-window: 200000
                    max-output-tokens: 100000
                o3:
                  # Source: models.dev openai/o3
                  pattern: o3*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 200000
                    max-output-tokens: 100000
                o4:
                  # Source: models.dev openai/o4-mini (no bare "o4" entry
                  # exists; -mini is the only o4 family member). Its input
                  # modalities lack PDF/document support, unlike the family
                  # default.
                  pattern: o4*
                  capabilities:
                    supports-reasoning: true
                    supports-reasoning-signature-roundtrip: true
                    context-window: 200000
                    max-output-tokens: 100000
                    input-modalities:
                      user-message: [text, image]
                gpt-4o:
                  # Source: models.dev openai/gpt-4o. Input modalities
                  # (text/image/pdf) match the family default, so no override
                  # is needed here (previous "audio" claim was not sourced and
                  # has been removed).
                  pattern: gpt-4o*
                  capabilities:
                    max-output-tokens: 16384
                gpt-4-1:
                  # Source: models.dev openai/gpt-4.1
                  pattern: gpt-4.1*
                  capabilities:
                    context-window: 1047576
                    max-output-tokens: 32768
                gpt-fallback:
                  pattern: gpt-*
                  capabilities: {}
